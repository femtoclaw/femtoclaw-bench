name: benchmarks

on:
  push:
  pull_request:

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --all
      - run: cargo bench --no-fail-fast
      - run: cargo run --release -- run --preset core
